<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Psixologiya Quiz - Fanlar</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="top-controls">
        <button class="high-scores-btn" onclick="toggleHighScores()">
            <i class="fas fa-trophy"></i> &nbsp; Natijalar
        </button>
        <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">
            <i class="fas fa-moon"></i>
        </button>
    </div>

    <div class="container" id="app">
        <!-- Category Selection View -->
        <div id="category-view">
            <h1>Psixologiya Quiz</h1>
            <p>Davom etish uchun bo'limni tanlang:</p>
            <div class="subjects-grid">
                <div class="subject-card category-card" onclick="showCategory('psix')">
                    <div class="icon-wrapper"><i class="fas fa-book-open"></i></div>
                    <h3>Psixologiya Fanlari</h3>
                    <div class="meta">6 ta fan mavjud</div>
                </div>
                <div class="subject-card category-card yakuniy-main-card" onclick="showCategory('yakuniy')">
                    <div class="badge">Yangi</div>
                    <div class="icon-wrapper"><i class="fas fa-graduation-cap"></i></div>
                    <h3>Yakuniy Testlar</h3>
                    <div class="meta">3 ta fan mavjud</div>
                </div>
            </div>
        </div>

        <!-- Subject Selection View -->
        <div id="subject-view" style="display: none;">
            <div class="quiz-header">
                <button class="back-btn" onclick="showCategories()">← Orqaga</button>
                <h2 id="category-title">Fanlar</h2>
            </div>
            <p id="category-desc">Bilimingizni sinab ko'rish uchun fanni tanlang:</p>
            <div class="subjects-grid" id="subjects-container">
                <!-- Subjects will be injected here -->
            </div>
        </div>

        <!-- Level Selection View -->
        <div id="level-view" style="display: none;">
            <div class="quiz-header">
                <button class="back-btn" onclick="backToSubjects()">← Orqaga</button>
                <h2 id="selected-subject-title"></h2>
            </div>
            <p id="level-desc"></p>
            
            <div class="subjects-grid" id="levels-container">
                <!-- Levels will be injected here -->
            </div>
        </div>

        <!-- High Scores View -->
        <div id="scores-view" style="display: none;">
            <div class="quiz-header">
                <button class="back-btn" onclick="showSubjects()">← Orqaga</button>
                <h2>Eng yaxshi natijalar</h2>
            </div>
            <div id="scores-container" class="scores-list">
                <!-- Scores will be injected here -->
            </div>
        </div>
    </div>

    <script>
        let currentSubject = '';
        let currentCategory = '';

        const psixSubjects = [
            { name: "Psixologik xizmat ko'rsatish asoslari", count: 150 },
            { name: "Oila psixologiyasi", count: 150 },
            { name: "Kreativ pedagogika", count: 150 },
            { name: "Milliy tarbiya asoslari", count: 150 },
            { name: "Pedagogika psixologiya", count: 151 },
            { name: "Deviant xulq atvor", count: 150 }
        ];

        const yakuniySubjects = []; // Dynamic now

        // Theme Logic
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeIcon(newTheme);
        }

        function updateThemeIcon(theme) {
            const btn = document.getElementById('theme-btn');
            btn.innerHTML = theme === 'dark' ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
        }

        // Initialize theme
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        updateThemeIcon(savedTheme);

        function showCategory(type) {
            currentCategory = type;
            document.getElementById('category-view').style.display = 'none';
            document.getElementById('subject-view').style.display = 'block';
            
            const container = document.getElementById('subjects-container');
            const title = document.getElementById('category-title');
            container.innerHTML = '<div class="loading">Yuklanmoqda...</div>';

            if (type === 'psix') {
                title.innerText = 'Psixologiya Fanlari';
                container.innerHTML = '';
                psixSubjects.forEach(s => {
                    container.innerHTML += `
                        <div class="subject-card" onclick="selectSubject('${s.name}', 'psix.json', ${s.count})">
                            <h3>${s.name}</h3>
                            <div class="meta">${s.count} savol</div>
                        </div>
                    `;
                });
            } else {
                title.innerText = 'Yakuniy Testlar';
                fetch('yakuniy.json')
                    .then(res => res.json())
                    .then(data => {
                        container.innerHTML = '';
                        const subjectsMap = {};
                        data.forEach(q => {
                            const name = q.Fan_nomi || "";
                            if (name.trim() !== "") {
                                subjectsMap[name] = (subjectsMap[name] || 0) + 1;
                            }
                        });

                        Object.keys(subjectsMap).forEach(name => {
                            container.innerHTML += `
                                <div class="subject-card yakuniy-card" onclick="selectSubject('${name}', 'yakuniy.json', ${subjectsMap[name]})">
                                    <h3>${name}</h3>
                                    <div class="meta">${subjectsMap[name]} savol</div>
                                </div>
                            `;
                        });
                    })
                    .catch(() => {
                        container.innerHTML = '<div class="error">Xatolik yuz berdi.</div>';
                    });
            }
        }

        function selectSubject(subject, file, totalCount) {
            currentSubject = subject;
            document.getElementById('subject-view').style.display = 'none';
            document.getElementById('level-view').style.display = 'block';
            document.getElementById('scores-view').style.display = 'none';
            document.getElementById('selected-subject-title').innerText = subject;
            
            localStorage.setItem('selectedSubject', subject);
            localStorage.setItem('selectedFile', file);
            localStorage.setItem('totalQuestions', totalCount);
            
            generateLevels(totalCount);
        }

        function generateLevels(total) {
            const container = document.getElementById('levels-container');
            const desc = document.getElementById('level-desc');
            container.innerHTML = '';
            
            const levelsCount = 5;
            const perLevel = Math.ceil(total / levelsCount);
            
            desc.innerText = `Jami ${total} ta savol mavjud. 5 ta bosqichga bo'lingan (har birida ~${perLevel} tadan).`;

            for (let i = 1; i <= levelsCount; i++) {
                const start = (i - 1) * perLevel + 1;
                let end = i * perLevel;
                if (end > total) end = total;
                if (start > total) break;

                container.innerHTML += `
                    <div class="subject-card" onclick="startQuiz(${i})">
                        <h3>${i}-daraja</h3>
                        <div class="meta">${start} - ${end} savollar</div>
                    </div>
                `;
            }
        }

        function showSubjects() {
            showCategory(currentCategory || 'psix');
        }

        function toggleHighScores() {
            const subjectView = document.getElementById('subject-view');
            const scoresView = document.getElementById('scores-view');
            const levelView = document.getElementById('level-view');
            const categoryView = document.getElementById('category-view');

            if (scoresView.style.display === 'none') {
                subjectView.style.display = 'none';
                levelView.style.display = 'none';
                categoryView.style.display = 'none';
                scoresView.style.display = 'block';
                displayScores();
            } else {
                showCategories();
            }
        }

        function displayScores() {
            const container = document.getElementById('scores-container');
            const scores = JSON.parse(localStorage.getItem('psix_high_scores') || '[]');
            
            if (scores.length === 0) {
                container.innerHTML = '<p class="meta">Hozircha natijalar yo\'q.</p>';
                return;
            }

            container.innerHTML = scores
                .sort((a, b) => b.score - a.score)
                .slice(0, 10)
                .map(s => `
                    <div class="score-row">
                        <span class="score-name">${s.subject} (${s.level}-daraja)</span>
                        <span class="score-value">${s.score} / ${s.total}</span>
                    </div>
                `).join('');
        }

        function startQuiz(level) {
            localStorage.setItem('selectedLevel', level);
            window.location.href = 'quiz.html';
        }
    </script>
</body>
</html>
